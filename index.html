<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Повтори Позу</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="startScreen" class="modal-overlay">
        <div class="modal-content">
            <h2>Повтори позу</h2>
            <p>Включай камеру, отойди подальше, чтобы тебя было видно в полный рост, и постарайся в точности повторить черный силуэт на экране.</p>
            <p>С каждым разом времени будет все меньше!</p>
            <button id="startBtn">Начать игру</button>
        </div>
    </div>

    <div id="gameOverScreen" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Время вышло!</h2>
            <p>Ты не успел принять нужную позу.</p>
            <button id="restartBtn">Попробовать снова</button>
        </div>
    </div>

    <div class="game-container">
        <div id="silhouette-container">
            <img id="silhouette" src="" alt="Поза">
        </div>
        
        <div id="timer">Ожидание...</div>

        <video id="videoElement" autoplay playsinline style="display: none;"></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
